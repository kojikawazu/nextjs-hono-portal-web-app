name: Pull Request Test

on:
    pull_request:
        paths:
            - '.github/**'
            - '__tests__/**'
            - 'e2e/**'
            - 'public/**'
            - 'src/**'
            - '.prettierrc'
            - 'eslint.config.mjs'
            - 'Dockerfile'
            - 'jest.config.js'
            - 'jest.setup.ts'
            - 'next.config.mjs'
            - 'pnpm-lock.yaml'
            - 'package.json'
            - 'playwright.config.ts'
            - 'postcss.config.js'
            - 'tailwind.config.js'
            - 'tsconfig.json'

jobs:
    test:
        uses: ./.github/workflows/test.yml
        secrets: inherit
