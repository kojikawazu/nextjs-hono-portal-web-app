# GCS 統合テスト（IT）用のエミュレータ。`pnpm run test:it` から利用する。
# 事前投入データは ./e2e/tests/mock/gcs-seed/<bucket>/<object> の構造で配置する。
services:
    fake-gcs:
        image: fsouza/fake-gcs-server:latest
        command:
            - '-scheme'
            - 'http'
            - '-port'
            - '4443'
            - '-public-host'
            - 'localhost:4443'
            - '-external-url'
            - 'http://localhost:4443'
        ports:
            - '4443:4443'
        volumes:
            - ./e2e/tests/mock/gcs-seed:/data
